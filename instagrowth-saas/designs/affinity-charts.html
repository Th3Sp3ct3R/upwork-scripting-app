<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Affinity Dashboard Charts</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--card:#12121a;--border:#1e1e2e;--accent:#6c5ce7;--green:#00b894;--text:#e0e0e0;--muted:#666}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);padding:2rem}
h1{font-size:1.4rem;margin-bottom:.3rem}
.sub{color:var(--muted);font-size:.85rem;margin-bottom:2rem}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:1.5rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.5rem}
.card h3{font-size:.9rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
canvas{max-height:250px}
.gauge-wrap{display:flex;justify-content:center;align-items:center;flex-direction:column}
.sparkline-row{display:flex;align-items:center;gap:1rem;padding:.6rem 0;border-bottom:1px solid var(--border)}
.sparkline-row:last-child{border:none}
.spark-label{width:100px;font-size:.8rem}
.spark-canvas{flex:1;height:30px}
.spark-val{font-size:.85rem;font-weight:600;width:50px;text-align:right}
.cluster-viz{position:relative;height:280px;margin-top:.5rem}
.cluster-node{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:600;cursor:pointer;transition:transform .2s;z-index:2}
.cluster-node:hover{transform:scale(1.2)}
</style>
</head>
<body>
<h1>🎯 Affinity Dashboard</h1>
<p class="sub">Audience affinity analysis & cluster intelligence</p>
<div class="grid">
  <div class="card">
    <h3>🎯 Confidence Gauge</h3>
    <div class="gauge-wrap"><canvas id="gauge" width="300" height="200"></canvas><div style="font-size:.8rem;color:var(--muted);margin-top:-1rem">Audience Match Confidence</div></div>
  </div>
  <div class="card">
    <h3>📈 Trend Sparklines</h3>
    <div id="sparklines"></div>
  </div>
  <div class="card">
    <h3>🔗 Cluster Relationships</h3>
    <div class="cluster-viz" id="clusters"></div>
  </div>
  <div class="card">
    <h3>📊 Affinity Breakdown</h3>
    <canvas id="radarChart"></canvas>
  </div>
  <div class="card" style="grid-column:span 2">
    <h3>📅 Engagement Over Time</h3>
    <canvas id="timeChart" height="100"></canvas>
  </div>
</div>
<script>
Chart.defaults.color='#666';Chart.defaults.borderColor='#1e1e2e';
// Gauge (doughnut)
new Chart(document.getElementById('gauge'),{type:'doughnut',data:{datasets:[{data:[78,22],backgroundColor:['#6c5ce7','#1e1e2e'],borderWidth:0,circumference:180,rotation:270}]},options:{cutout:'75%',plugins:{legend:{display:false},tooltip:{enabled:false}},animation:{animateRotate:true}}});
// After gauge renders, draw text
setTimeout(()=>{const c=document.getElementById('gauge').getContext('2d');c.font='bold 28px Inter';c.fillStyle='#6c5ce7';c.textAlign='center';c.fillText('78%',150,170)},500);

// Sparklines
const sparks=[{label:'Fitness',data:[30,35,32,40,38,45,50,48,55,60],color:'#00b894'},{label:'Fashion',data:[20,22,25,23,28,30,27,32,35,33],color:'#6c5ce7'},{label:'Tech',data:[45,42,40,38,35,33,30,28,25,22],color:'#e17055'},{label:'Food',data:[15,18,20,22,25,28,30,35,38,42],color:'#74b9ff'}];
const sd=document.getElementById('sparklines');
sparks.forEach(s=>{
  const row=document.createElement('div');row.className='sparkline-row';
  row.innerHTML=`<span class="spark-label">${s.label}</span><canvas class="spark-canvas" width="200" height="30"></canvas><span class="spark-val" style="color:${s.color}">${s.data[s.data.length-1]}%</span>`;
  sd.appendChild(row);
  const ctx=row.querySelector('canvas').getContext('2d');
  const max=Math.max(...s.data),min=Math.min(...s.data);
  ctx.strokeStyle=s.color;ctx.lineWidth=2;ctx.beginPath();
  s.data.forEach((v,i)=>{const x=i/(s.data.length-1)*200;const y=28-((v-min)/(max-min))*26;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});
  ctx.stroke();
});

// Clusters
const cl=document.getElementById('clusters');
const clusters=[{x:30,y:30,r:50,label:'Fitness',color:'rgba(0,184,148,.3)',border:'#00b894'},{x:55,y:25,r:40,label:'Health',color:'rgba(108,92,231,.3)',border:'#6c5ce7'},{x:70,y:55,r:45,label:'Fashion',color:'rgba(116,185,255,.3)',border:'#74b9ff'},{x:25,y:65,r:35,label:'Food',color:'rgba(253,203,110,.3)',border:'#fdcb6e'},{x:50,y:60,r:30,label:'Travel',color:'rgba(225,112,85,.3)',border:'#e17055'}];
// Draw SVG lines first
let svg=`<svg style="position:absolute;inset:0;width:100%;height:100%;z-index:1" viewBox="0 0 100 100">`;
[[0,1],[1,2],[0,3],[3,4],[2,4]].forEach(([a,b])=>{svg+=`<line x1="${clusters[a].x}" y1="${clusters[a].y}" x2="${clusters[b].x}" y2="${clusters[b].y}" stroke="#1e1e2e" stroke-width=".5"/>`});
svg+=`</svg>`;cl.innerHTML=svg;
clusters.forEach(c=>{const n=document.createElement('div');n.className='cluster-node';n.style.cssText=`left:${c.x}%;top:${c.y}%;width:${c.r}px;height:${c.r}px;background:${c.color};border:2px solid ${c.border};transform:translate(-50%,-50%)`;n.textContent=c.label;cl.appendChild(n)});

// Radar
new Chart(document.getElementById('radarChart'),{type:'radar',data:{labels:['Fitness','Fashion','Tech','Food','Travel','Music'],datasets:[{label:'Affinity',data:[78,65,45,70,55,60],backgroundColor:'rgba(108,92,231,.2)',borderColor:'#6c5ce7',pointBackgroundColor:'#6c5ce7'}]},options:{scales:{r:{grid:{color:'#1e1e2e'},ticks:{display:false},pointLabels:{color:'#999'}}},plugins:{legend:{display:false}}}});

// Time
new Chart(document.getElementById('timeChart'),{type:'line',data:{labels:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],datasets:[{label:'Engagement',data:[2.1,2.4,2.8,3.1,3.5,3.2,3.8,4.1,4.5,4.2,4.8,5.2],borderColor:'#6c5ce7',backgroundColor:'rgba(108,92,231,.1)',fill:true,tension:.4},{label:'Followers',data:[1.2,1.5,1.8,2.2,2.5,2.8,3.0,3.4,3.6,3.9,4.1,4.5],borderColor:'#00b894',backgroundColor:'rgba(0,184,148,.1)',fill:true,tension:.4}]},options:{plugins:{legend:{labels:{boxWidth:12}}},scales:{y:{grid:{color:'#1e1e2e'}}}}});
</script>
</body>
</html>
