<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VANTA Fleet Audit Report</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Courier New', monospace;
      background: #0a0e27;
      color: #e0e0e0;
      padding: 20px;
      line-height: 1.6;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    .header {
      text-align: center;
      padding: 30px 0;
      border-bottom: 3px solid #ffd700;
      margin-bottom: 30px;
    }
    h1 {
      font-size: 2.5em;
      color: #ffd700;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }
    .timestamp {
      color: #888;
      font-size: 0.9em;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }
    .summary-card {
      background: #1a1f3a;
      border: 2px solid #ffd700;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }
    .summary-label {
      color: #888;
      font-size: 0.85em;
      margin-bottom: 10px;
    }
    .summary-value {
      font-size: 2em;
      color: #ffd700;
      font-weight: bold;
    }
    .device-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .device-card {
      border: 2px solid #333;
      border-radius: 8px;
      overflow: hidden;
    }
    .device-header {
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      padding: 15px;
      border-bottom: 2px solid #ffd700;
    }
    .device-id {
      font-size: 1.2em;
      font-weight: bold;
      color: #ffd700;
      margin-bottom: 8px;
    }
    .device-stats {
      font-size: 0.85em;
      color: #aaa;
    }
    .device-body {
      background: #0f1430;
      padding: 15px;
      max-height: 300px;
      overflow-y: auto;
    }
    .account-item {
      padding: 8px;
      margin-bottom: 6px;
      border-radius: 4px;
      border-left: 4px solid #333;
      font-size: 0.85em;
    }
    .account-item.logged_in {
      border-left-color: #00ff41;
      background: rgba(0, 255, 65, 0.05);
    }
    .account-item.offline {
      border-left-color: #666;
      background: rgba(100, 100, 100, 0.05);
    }
    .username {
      color: #00ff41;
      font-weight: bold;
    }
    .display-name {
      color: #888;
      font-size: 0.8em;
    }
    .status-badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.7em;
      margin-left: 5px;
      background: #444;
      color: #ccc;
    }
    .status-badge.logged_in {
      background: #00ff41;
      color: #000;
    }
    .issues-section {
      background: #1a1f3a;
      border: 2px solid #ff6b6b;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 30px;
    }
    .issues-section h2 {
      color: #ff6b6b;
      margin-bottom: 15px;
    }
    .issue-item {
      padding: 10px;
      margin-bottom: 8px;
      background: rgba(255, 107, 107, 0.1);
      border-left: 4px solid #ff6b6b;
      border-radius: 4px;
    }
    .issue-title {
      color: #ff6b6b;
      font-weight: bold;
    }
    .issue-detail {
      font-size: 0.85em;
      color: #ccc;
      margin-top: 5px;
    }
    .footer {
      text-align: center;
      padding: 20px;
      color: #666;
      border-top: 1px solid #333;
      font-size: 0.85em;
    }
    @media print {
      body { background: white; color: black; }
      .header { border-bottom-color: black; }
      h1 { color: black; }
      .summary-card { border-color: black; background: #f5f5f5; }
      .summary-value { color: black; }
      .device-header { background: #ccc; color: black; }
      .device-id { color: black; }
      .device-body { background: white; border: 1px solid #ddd; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⚡ VANTA FLEET AUDIT</h1>
      <div class="timestamp">Generated: <span id="timestamp"></span></div>
    </div>

    <div class="summary">
      <div class="summary-card">
        <div class="summary-label">Total Devices</div>
        <div class="summary-value"><span id="total-devices">-</span></div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Total Accounts</div>
        <div class="summary-value"><span id="total-accounts">-</span></div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Logged In</div>
        <div class="summary-value"><span id="logged-in">-</span></div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Issues Found</div>
        <div class="summary-value"><span id="issue-count">-</span></div>
      </div>
    </div>

    <div id="issues-container"></div>
    <div id="devices-container" class="device-grid"></div>

    <div class="footer">
      <p>This report is auto-generated from the VANTA fleet audit script.</p>
      <p>For issues or repairs, see audit-issues.md in the vanta-fleet-audit skill.</p>
    </div>
  </div>

  <script>
    // Placeholder for JSON data injection
    // Usage: Replace AUDIT_DATA with actual JSON output from fleet-audit.ts
    const AUDIT_DATA = {{AUDIT_JSON}};

    function renderReport() {
      document.getElementById('timestamp').textContent = new Date().toLocaleString();
      
      if (!AUDIT_DATA || !AUDIT_DATA.devices) {
        document.body.innerHTML = '<p>No audit data provided</p>';
        return;
      }

      const devices = AUDIT_DATA.devices || [];
      const accounts = AUDIT_DATA.accounts || [];
      const orphans = AUDIT_DATA.orphans || [];

      // Summary
      const loggedInCount = accounts.filter(a => a.session_state === 'logged_in').length;
      document.getElementById('total-devices').textContent = devices.length;
      document.getElementById('total-accounts').textContent = accounts.length;
      document.getElementById('logged-in').textContent = loggedInCount;
      document.getElementById('issue-count').textContent = orphans.length;

      // Issues
      if (orphans.length > 0) {
        const issuesHTML = `
          <div class="issues-section">
            <h2>🚨 Issues Found</h2>
            ${orphans.map(o => `
              <div class="issue-item">
                <div class="issue-title">Orphan Session</div>
                <div class="issue-detail">Device: ${o.device_id}</div>
                <div class="issue-detail">Account: @${o.account_username}</div>
                <div class="issue-detail">State: ${o.session_state}</div>
              </div>
            `).join('')}
          </div>
        `;
        document.getElementById('issues-container').innerHTML = issuesHTML;
      }

      // Devices
      const accountsByDevice = {};
      accounts.forEach(acc => {
        if (!accountsByDevice[acc.device_id]) {
          accountsByDevice[acc.device_id] = [];
        }
        accountsByDevice[acc.device_id].push(acc);
      });

      const devicesHTML = devices.map(d => {
        const accs = accountsByDevice[d.device_id] || [];
        const loggedInAccounts = accs.filter(a => a.session_state === 'logged_in');
        
        return `
          <div class="device-card">
            <div class="device-header">
              <div class="device-id">📱 ${d.device_id}</div>
              <div class="device-stats">
                ${accs.length} accounts | ${loggedInAccounts.length} logged in
              </div>
            </div>
            <div class="device-body">
              ${accs.map(acc => `
                <div class="account-item ${acc.session_state === 'logged_in' ? 'logged_in' : 'offline'}">
                  <span class="username">@${acc.username}</span>
                  <span class="display-name">(${acc.current_display_name || 'N/A'})</span>
                  <span class="status-badge ${acc.session_state === 'logged_in' ? 'logged_in' : ''}">
                    ${acc.session_state || acc.status}
                  </span>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('devices-container').innerHTML = devicesHTML;
    }

    renderReport();
  </script>
</body>
</html>
